
# Map HTTP Upgrade header for WebSocket proxying (Y.js collaboration)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Redirect all HTTP to HTTPS ───────────────────────────────────────────────
server {
    listen 80;
    server_name drafts-io.com www.drafts-io.com backend.drafts-io.com;

    # Required for Certbot ACME challenge renewals
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Frontend — drafts-io.com ─────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name drafts-io.com www.drafts-io.com;

    ssl_certificate     /etc/letsencrypt/live/drafts-io.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drafts-io.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
}

# ── Backend API — backend.drafts-io.com ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name backend.drafts-io.com;

    ssl_certificate     /etc/letsencrypt/live/drafts-io.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drafts-io.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # WebSocket support (Y.js real-time collaboration + SSE)
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
