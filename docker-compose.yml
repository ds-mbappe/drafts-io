services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drafts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-drafts}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drafts}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file: apps/backend/.env.production
    environment:
      PORT: "3001"
      POSTGRES_PRISMA_URL: postgresql://${POSTGRES_USER:-drafts}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-drafts}
      POSTGRES_URL_NON_POOLING: postgresql://${POSTGRES_USER:-drafts}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-drafts}
      FRONTEND_URL: https://drafts-io.com
      HOSTNAME: https://backend.drafts-io.com
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/gcp-key.json
    ports:
      - "3001:3001"
    volumes:
      - ${GCP_KEY_PATH}:/run/secrets/gcp-key.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: https://backend.drafts-io.com
        NEXT_PUBLIC_VERCEL_ENV: production
    restart: unless-stopped
    env_file: apps/frontend/.env.production
    environment:
      AUTH_URL: https://drafts-io.com
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app

volumes:
  postgres_data:

networks:
  app:
    driver: bridge
